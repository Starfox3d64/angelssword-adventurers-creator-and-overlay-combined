<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AS Adventurer</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <div id="overlay-container">
    <!-- Asset layers - all preloaded, toggled via CSS -->
    <div class="asset-layer" id="layer-neutral_idle"></div>
    <div class="asset-layer" id="layer-neutral_speaking"></div>
    <div class="asset-layer" id="layer-happy_idle"></div>
    <div class="asset-layer" id="layer-happy_speaking"></div>
    <div class="asset-layer" id="layer-sad_idle"></div>
    <div class="asset-layer" id="layer-sad_speaking"></div>
    <div class="asset-layer" id="layer-surprised_idle"></div>
    <div class="asset-layer" id="layer-surprised_speaking"></div>
    <div class="asset-layer" id="layer-typing"></div>
    <div class="asset-layer" id="layer-eyes_closed"></div>
    <div class="asset-layer" id="layer-emote"></div>
  </div>

  <!-- Debug overlay (hidden by default, toggle with ?debug=1) -->
  <div id="debug-panel">
    <div id="debug-state">--</div>
    <div id="debug-expression">--</div>
    <div id="debug-voice">--</div>
    <div id="debug-mic-level">
      <div id="debug-mic-bar"></div>
    </div>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
