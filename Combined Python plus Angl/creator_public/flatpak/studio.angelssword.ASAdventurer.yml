# Flatpak manifest for AS Adventurer Creator.
# Prefer building via: npm run build:linux:flatpak
# (that command stages the linux binary and runs flatpak-builder).
#
# Current docs use Freedesktop 25.08:
#   https://docs.flatpak.org/en/latest/first-build.html
#
# Manual build (after linux-x64 release exists under dist/):
#   flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
#   flatpak-builder --force-clean --user --install-deps-from=flathub --repo=repo \
#     builddir flatpak/studio.angelssword.ASAdventurer.yml
#   flatpak build-bundle repo dist/ASAdventurer-linux-x64.flatpak \
#     studio.angelssword.ASAdventurer

id: studio.angelssword.ASAdventurer
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: as-adventurer

finish-args:
  # Local server + AI API proxy outbound; host browser hits localhost:3001
  - --share=network
  - --share=ipc
  # xdg-open → host browser via xdg-desktop-portal
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.portal.Desktop
  # Export temp work uses the sandbox tmp; browser downloads land on the host.

modules:
  - name: as-adventurer
    buildsystem: simple
    build-commands:
      - install -d /app/lib/as-adventurer/bin
      - install -Dm755 ASAdventurer /app/lib/as-adventurer/ASAdventurer
      - install -Dm755 bin/ffmpeg /app/lib/as-adventurer/bin/ffmpeg
      - |
        if [ -f bin/ffmpeg.LICENSE ]; then
          install -Dm644 bin/ffmpeg.LICENSE /app/lib/as-adventurer/bin/ffmpeg.LICENSE
        fi
      - cp -a www /app/lib/as-adventurer/www
      - install -Dm755 as-adventurer.sh /app/bin/as-adventurer
      - install -Dm644 studio.angelssword.ASAdventurer.desktop /app/share/applications/studio.angelssword.ASAdventurer.desktop
      - install -Dm644 studio.angelssword.ASAdventurer.metainfo.xml /app/share/metainfo/studio.angelssword.ASAdventurer.metainfo.xml
      - install -Dm644 icon.png /app/share/icons/hicolor/256x256/apps/studio.angelssword.ASAdventurer.png
    sources:
      # Populated by build-exe.js — linux release tree (binary, bin/, www/)
      - type: dir
        path: ../dist/ASAdventurer-linux-x64
      - type: file
        path: as-adventurer.sh
      - type: file
        path: studio.angelssword.ASAdventurer.desktop
      - type: file
        path: studio.angelssword.ASAdventurer.metainfo.xml
      - type: file
        path: ../icon.png
